name: Remote Mod Build
on: [push, workflow_dispatch] # Runs every time you save or click a button
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant Execute Permission
        run: chmod +x gradlew
      - name: Build JAR
        run: ./gradlew build
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: MyFinishedMod
          path: build/libs/*.jar
